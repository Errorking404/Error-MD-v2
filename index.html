<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ERROR-MD  | WhatsApp Bot</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"/>
  
<style>
:root {
  --primary: #10b981;
  --primary-dark: #0ea271;
  --dark-bg: #0f172a;
  --card-bg: rgba(15, 23, 42, 0.9);
  --text-main: #f1f5f9;
  --text-dim: #94a3b8;
  --border: rgba(148, 163, 184, 0.1);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', system-ui, sans-serif;
}

body {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  background: var(--dark-bg);
  color: var(--text-main);
  background-image: 
    radial-gradient(circle at 10% 20%, rgba(16, 185, 129, 0.08) 0%, transparent 30%),
    radial-gradient(circle at 90% 80%, rgba(139, 92, 246, 0.05) 0%, transparent 30%);
}

.container {
  width: 100%;
  max-width: 420px;
  background: var(--card-bg);
  backdrop-filter: blur(10px);
  border-radius: 20px;
  padding: 30px 25px;
  border: 1px solid var(--border);
  box-shadow: 0 20px 60px -30px rgba(0, 0, 0, 0.5);
}

.header {
  text-align: center;
  margin-bottom: 25px;
}

.bot-image {
  width: 190px;
  height: 120px;
  border-radius: 20px;
  object-fit: cover;
  display: block;
  margin: 0 auto 15px;
  border: 3px solid var(--primary);
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
}

.title {
  font-size: 2rem;
  font-weight: 900;
  letter-spacing: -0.5px;
  background: linear-gradient(to right, var(--primary), #34d399);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 8px;
}

.subtitle {
  font-size: 0.9rem;
  color: var(--text-dim);
  margin-bottom: 25px;
  font-weight: 500;
}

.status-strip {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin: 0 0 22px;
}

.status-chip {
  padding: 10px 12px;
  border-radius: 12px;
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid var(--border);
  font-size: 12px;
  line-height: 1.35;
}

.status-chip strong {
  display: block;
  font-size: 13px;
  margin-bottom: 3px;
  color: white;
}

.status-online {
  color: #34d399;
}

.status-offline {
  color: #f87171;
}

.toggle-container {
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 20px;
  background: rgba(255, 255, 255, 0.03);
  border-radius: 14px;
  padding: 4px;
  border: 1px solid var(--border);
}

.toggle-option {
  flex: 1;
  padding: 12px 16px;
  text-align: center;
  cursor: pointer;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 700;
  transition: all 0.3s ease;
  color: rgba(255, 255, 255, 0.7);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.toggle-option.active {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: white;
}

.input-group {
  margin-bottom: 20px;
}

.input-label {
  display: block;
  margin-bottom: 8px;
  font-weight: 600;
  font-size: 14px;
  color: rgba(255, 255, 255, 0.85);
}

.input-field {
  width: 100%;
  padding: 14px 16px;
  border: 1.5px solid var(--border);
  border-radius: 12px;
  background: rgba(0, 0, 0, 0.2);
  color: white;
  font-size: 15px;
  transition: all 0.3s ease;
}

.input-field:focus {
  outline: none;
  border-color: var(--primary);
  background: rgba(0, 0, 0, 0.3);
}

.generate-btn {
  width: 100%;
  padding: 16px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border: none;
  border-radius: 12px;
  color: white;
  font-size: 16px;
  font-weight: 800;
  cursor: pointer;
  transition: all 0.3s ease;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}

.generate-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 25px -10px rgba(16, 185, 129, 0.3);
}

.generate-btn.hidden {
  display: none;
}

.loading {
  display: none;
  text-align: center;
  margin: 20px 0;
}

.loading i {
  font-size: 24px;
  color: var(--primary);
  animation: spin 1s linear infinite;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

.code-display {
  background: rgba(255, 255, 255, 0.03);
  padding: 18px;
  border-radius: 12px;
  text-align: center;
  font-size: 20px;
  font-weight: 900;
  margin-bottom: 20px;
  min-height: 60px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1.5px solid var(--border);
  color: white;
  letter-spacing: 1px;
}

.qr-display {
  background: rgba(255, 255, 255, 0.03);
  padding: 20px;
  border-radius: 12px;
  text-align: center;
  margin-bottom: 20px;
  border: 1.5px solid var(--border);
  display: none;
}

.qr-image {
  max-width: 250px;
  max-height: 250px;
  margin: 0 auto 15px;
  border-radius: 12px;
}

.qr-instructions {
  font-size: 13px;
  color: var(--text-dim);
  line-height: 1.5;
}

.copy-btn {
  width: 100%;
  padding: 16px;
  background: rgba(255, 255, 255, 0.04);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  font-size: 15px;
  font-weight: 800;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  color: rgba(255, 255, 255, 0.9);
  transition: all 0.3s ease;
}

.copy-btn:hover {
  border-color: var(--primary);
  background: rgba(255, 255, 255, 0.06);
}

.success-message {
  color: var(--primary);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  font-size: 18px;
}

.error-message {
  color: #ff4757;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  font-size: 15px;
}

.footer {
  text-align: center;
  margin-top: 20px;
  font-size: 12px;
  color: rgba(255, 255, 255, 0.5);
}

@media (max-width: 480px) {
  .container {
    padding: 25px 20px;
  }
  
  .bot-image {
    width: 250px;
    height: 190px;
  }
  
  .title {
    font-size: 1.8rem;
  }
}
</style>
</head>
<body>
  <div class="container">
    <div class="header">
      <img class="bot-image" src="icon.png" alt="ERROR-MD "/>
      <h1 class="title">ERROR-MD </h1>
      <p class="subtitle">Multi-Device WhatsApp Bot</p>
      <div class="status-strip">
        <div class="status-chip">
          <strong>Server</strong>
          <span id="serverStatus" class="status-offline">Checking...</span>
        </div>
        <div class="status-chip">
          <strong>Active</strong>
          <span id="activeSessions">0</span>
        </div>
        <div class="status-chip">
          <strong>Total</strong>
          <span id="totalSessions">0</span>
        </div>
      </div>
    </div>

    <!-- Toggle Switch -->
    <div class="toggle-container">
      <div class="toggle-option active" data-mode="pair">
        <i class="fas fa-key"></i> Pair Code
      </div>
      <div class="toggle-option" data-mode="qr">
        <i class="fas fa-qrcode"></i> QR Code
      </div>
    </div>

    <div class="input-group" id="inputGroup">
      <label class="input-label">Enter your WhatsApp number with country code</label>
      <input
        type="tel"
        inputmode="numeric"
        id="mobileNumber"
        class="input-field"
        placeholder="9234xxxxxxx"
        autocomplete="tel"
      >
    </div>

    <button class="generate-btn" id="submit">
      <i class="fas fa-key"></i> Generate Pair Code
    </button>

    <div class="loading" id="loading">
      <i class="fas fa-spinner"></i> Generating...
    </div>

    <div class="code-display" id="codeDisplay">
      Your pair code will appear here
    </div>

    <div class="qr-display" id="qrDisplay">
      <img id="qrImage" class="qr-image" src="" alt="QR Code">
      <div class="qr-instructions" id="qrInstructions">
        <b>How to Scan:</b><br>
        1. Open WhatsApp on your phone<br>
        2. Tap ⋮ Menu → Linked devices<br>
        3. Tap 'Link a device'<br>
        4. Scan this QR code
      </div>
    </div>

    <button class="copy-btn" id="copy" onclick="copyCode()">
      <i class="fas fa-copy"></i> Copy Code
    </button>

    <div class="footer">
      <p>© 2026 ERROR-MD</p>
    </div>
  </div>



  <script>

let currentMode = 'pair';
    let currentCode = '';
    let statusTimer = null;
    const API_BASE = window.location.origin && window.location.origin !== "null"
      ? window.location.origin
      : "http://localhost:3000";

    async function requestJson(url, options = {}) {
      const response = await fetch(`${API_BASE}${url}`, {
        cache: "no-store",
        ...options,
        headers: {
          Accept: "application/json",
          ...(options.headers || {})
        }
      });

      const data = await response.json().catch(() => ({}));
      if (!response.ok) {
        throw new Error(data.error || `Request failed with status ${response.status}`);
      }
      return data;
    }

    // Toggle functionality
    document.querySelectorAll('.toggle-option').forEach(option => {
      option.addEventListener('click', function() {
        const mode = this.dataset.mode;
        if (mode === currentMode) return;

        document.querySelectorAll('.toggle-option').forEach(opt => opt.classList.remove('active'));
        this.classList.add('active');
        currentMode = mode;

        const submitBtn = document.getElementById('submit');
        const inputGroup = document.getElementById('inputGroup');
        
        if (mode === 'pair') {
          submitBtn.innerHTML = '<i class="fas fa-key"></i> Generate Pair Code';
          submitBtn.classList.remove('hidden');
          inputGroup.classList.remove('hidden');
        } else {
          submitBtn.classList.add('hidden');
          inputGroup.classList.add('hidden');
          generateQRCode();
        }

        document.getElementById('codeDisplay').innerHTML = mode === 'pair' 
          ? 'Your pair code will appear here' 
          : 'Generating QR code...';
        document.getElementById('qrDisplay').style.display = 'none';
        document.getElementById('codeDisplay').style.display = 'flex';
      });
    });

    async function generateQRCode() {
      const codeDisplay = document.getElementById("codeDisplay");
      const qrDisplay = document.getElementById("qrDisplay");
      const loadingSpinner = document.getElementById("loading");

      loadingSpinner.style.display = "block";
      codeDisplay.innerHTML = '';
      qrDisplay.style.display = 'none';

      try {
        const data = await requestJson('/qr-start');
        
        if (data.qr) {
          document.getElementById('qrImage').src = data.qr;
          qrDisplay.style.display = 'block';
          codeDisplay.style.display = 'none';
          currentCode = data.sessionId || '';
        } else {
          codeDisplay.innerHTML = '<div class="error-message"><i class="fas fa-exclamation-circle"></i> Failed to generate QR code</div>';
          codeDisplay.style.display = 'flex';
        }
      } catch (error) {
        console.error("Error generating QR code:", error);
        codeDisplay.innerHTML = '<div class="error-message"><i class="fas fa-exclamation-circle"></i> Error generating QR code. Please try again.</div>';
        codeDisplay.style.display = 'flex';
      } finally {
        loadingSpinner.style.display = "none";
      }
    }

    async function refreshStatus() {
      const serverStatus = document.getElementById("serverStatus");
      const activeSessions = document.getElementById("activeSessions");
      const totalSessions = document.getElementById("totalSessions");

      try {
        const response = await fetch(`${API_BASE}/health`, { cache: "no-store" });
        const data = await response.json();

        serverStatus.textContent = data.status === "online" ? "Online" : "Offline";
        serverStatus.className = data.status === "online" ? "status-online" : "status-offline";
        activeSessions.textContent = String(data.active ?? 0);
        totalSessions.textContent = String(data.sessions ?? 0);
      } catch (error) {
        serverStatus.textContent = "Offline";
        serverStatus.className = "status-offline";
      }
    }

    document.getElementById("submit").addEventListener("click", async (e) => {
      e.preventDefault();
      
      const mobileNumberInput = document.getElementById("mobileNumber");
      const codeDisplay = document.getElementById("codeDisplay");
      const qrDisplay = document.getElementById("qrDisplay");
      const loadingSpinner = document.getElementById("loading");

      const mobileNumber = mobileNumberInput.value.trim();
      if (!mobileNumber) {
        codeDisplay.innerHTML = '<div class="error-message"><i class="fas fa-exclamation-circle"></i> Please enter your WhatsApp number</div>';
        return;
      }

      loadingSpinner.style.display = "block";
      codeDisplay.innerHTML = '';
      qrDisplay.style.display = 'none';

      try {
        const phoneNumber = mobileNumber.replace(/[^0-9]/g, "");
        const data = await requestJson(`/pair?number=${encodeURIComponent(phoneNumber)}`);
        
        const code = data.code || "Service Unavailable";
        if (code === "Service Unavailable" || code === "FAILED") {
          codeDisplay.innerHTML = '<div class="error-message"><i class="fas fa-exclamation-circle"></i> Service Unavailable</div>';
        } else {
          currentCode = code;
          codeDisplay.innerHTML = `<div class="success-message"><i class="fas fa-check-circle"></i> CODE: ${code}</div>`;
        }
        codeDisplay.style.display = 'flex';
      } catch (error) {
        console.error("Error generating code:", error);
        codeDisplay.innerHTML = '<div class="error-message"><i class="fas fa-exclamation-circle"></i> Error generating code. Please try again.</div>';
        codeDisplay.style.display = 'flex';
      } finally {
        loadingSpinner.style.display = "none";
      }
    });

    function copyCode() {
      if (!currentCode) {
        const copyBtn = document.getElementById("copy");
        const originalText = copyBtn.innerHTML;
        copyBtn.innerHTML = '<i class="fas fa-times"></i> No code to copy';
        copyBtn.style.color = '#ff4757';
        
        setTimeout(() => {
          copyBtn.innerHTML = originalText;
          copyBtn.style.color = '';
        }, 2000);
        return;
      }

      navigator.clipboard.writeText(currentCode).then(() => {
        const copyBtn = document.getElementById("copy");
        const originalText = copyBtn.innerHTML;
        copyBtn.innerHTML = '<i class="fas fa-check"></i> Copied!';
        copyBtn.style.color = 'var(--primary)';
        
        setTimeout(() => {
          copyBtn.innerHTML = originalText;
          copyBtn.style.color = '';
        }, 2000);
      }).catch(err => {
        console.error("Failed to copy text: ", err);
      });
    }

    // Auto-focus on input
    document.getElementById('mobileNumber').focus();

    refreshStatus();
    statusTimer = setInterval(refreshStatus, 10000);

  </script>
</body>
</html>
